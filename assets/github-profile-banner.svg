<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kenny Urvano - Fullstack Developer</title>
  <desc id="desc">Dark terminal style GitHub profile banner for Kenny Urvano.</desc>
  <rect width="1200" height="520" rx="24" fill="#0b1220"/>
  <defs>
    <linearGradient id="gridFade" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="0.52" stop-color="#14b8a6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="accent" x1="206" y1="126" x2="958" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.087 0 0 0 0 0.742 0 0 0 0 0.718 0 0 0 0.55 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <rect width="1200" height="520" fill="url(#gridFade)"/>
  <circle cx="1000" cy="88" r="148" fill="#2563eb" opacity="0.12"/>
  <circle cx="164" cy="425" r="180" fill="#14b8a6" opacity="0.12"/>
  <rect x="76" y="72" width="1048" height="376" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="76" y="72" width="1048" height="54" rx="18" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <path d="M77 126H1123" stroke="#334155" stroke-width="2"/>
  <circle cx="111" cy="99" r="8" fill="#ef4444"/>
  <circle cx="139" cy="99" r="8" fill="#f59e0b"/>
  <circle cx="167" cy="99" r="8" fill="#22c55e"/>
  <text x="600" y="105" fill="#94a3b8" font-family="Consolas, Monaco, monospace" font-size="18" text-anchor="middle">profile.js</text>
  <text x="128" y="175" fill="#22d3ee" font-family="Consolas, Monaco, monospace" font-size="20">$ whoami</text>
  <text x="128" y="214" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="28" font-weight="700">RAKOTONDRAZANDRY Kenny Urvano</text>
  <text x="128" y="262" fill="url(#accent)" font-family="Consolas, Monaco, monospace" font-size="54" font-weight="800" filter="url(#glow)">Developpeur Fullstack</text>
  <text x="128" y="311" fill="#cbd5e1" font-family="Consolas, Monaco, monospace" font-size="23">Web | Backend | Bases de donnees</text>
  <text x="128" y="354" fill="#94a3b8" font-family="Consolas, Monaco, monospace" font-size="19">Je transforme des besoins metier en applications claires, utiles et maintenables.</text>
  <g font-family="Consolas, Monaco, monospace" font-size="15" font-weight="700">
    <rect x="128" y="384" width="104" height="30" rx="15" fill="#0f172a" stroke="#22d3ee"/>
    <text x="180" y="405" text-anchor="middle" fill="#e2e8f0">React</text>
    <rect x="246" y="384" width="92" height="30" rx="15" fill="#0f172a" stroke="#2dd4bf"/>
    <text x="292" y="405" text-anchor="middle" fill="#e2e8f0">VueJS</text>
    <rect x="352" y="384" width="108" height="30" rx="15" fill="#0f172a" stroke="#60a5fa"/>
    <text x="406" y="405" text-anchor="middle" fill="#e2e8f0">Node.js</text>
    <rect x="474" y="384" width="122" height="30" rx="15" fill="#0f172a" stroke="#a78bfa"/>
    <text x="535" y="405" text-anchor="middle" fill="#e2e8f0">PostgreSQL</text>
    <rect x="610" y="384" width="84" height="30" rx="15" fill="#0f172a" stroke="#f59e0b"/>
    <text x="652" y="405" text-anchor="middle" fill="#e2e8f0">Docker</text>
  </g>
  <g opacity="0.95">
    <rect x="832" y="164" width="218" height="174" rx="14" fill="#020617" stroke="#334155"/>
    <text x="858" y="205" fill="#22d3ee" font-family="Consolas, Monaco, monospace" font-size="18">const focus = [</text>
    <text x="882" y="239" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="17">"Clean UI",</text>
    <text x="882" y="271" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="17">"REST APIs",</text>
    <text x="882" y="303" fill="#e2e8f0" font-family="Consolas, Monaco, monospace" font-size="17">"SQL"</text>
    <text x="858" y="329" fill="#22d3ee" font-family="Consolas, Monaco, monospace" font-size="18">];</text>
  </g>
</svg>
